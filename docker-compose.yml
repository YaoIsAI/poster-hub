# PosterHub Docker Compose
# AI-powered project poster generator

services:
  posterhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posterhub-app
    restart: unless-stopped
    ports:
      - "30008:3008"
    environment:
      - PORT=3008
      - NODE_ENV=production
      # GitHub Token（可选，用于增加 API 限流）
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # LLM 配置（Ollama 局域网）
      - LLM_API_KEY=ollama
      - LLM_BASE_URL=http://YOUR_OLLAMA_IP:11434/v1  # 修改为你的 Ollama 地址
      - LLM_MODEL=deepseek-r1:8b
    volumes:
      # 持久化海报数据
      - ./posters:/app/posters
      # 挂载 .env 配置（LLM 设置等）
      - ./.env:/app/.env
      # 可选：挂载项目目录用于本地项目分析
      # - /path/to/your/projects:/projects:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3008/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

