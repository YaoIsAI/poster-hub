# PosterHub Docker Compose
# AI-powered project poster generator

services:
  posterhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posterhub-app
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - NODE_ENV=production
      # GitHub Token（可选，用于增加 API 限流）
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # LLM 配置（支持 OpenAI 兼容格式）
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.minimaxi.com/v1}
      - LLM_MODEL=${LLM_MODEL:-MiniMax-M2.1}
    volumes:
      # 持久化海报数据
      - ./posters:/app/posters
      # 挂载 .env 配置（LLM 设置等）
      - ./.env:/app/.env
      # 可选：挂载项目目录用于本地项目分析
      # - /path/to/your/projects:/projects:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3008/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

